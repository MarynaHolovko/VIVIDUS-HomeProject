project.description = 'Sample tests demoing VIVIDUS capabilities'
group = 'org.vividus.demo'

ext.buildSystemPath = "${System.env.VIVIDUS_BUILD_SYSTEM_HOME?:buildSystemRootDir}/${buildSystemVersion}"

apply from: "${buildSystemPath}/vividus-test-project.gradle"

repositories {
    mavenCentral()
}

dependencies {
    implementation platform('org.vividus:vividus-bom:0.6.17')

    implementation 'org.vividus:vividus'

    implementation('org.vividus:vividus-plugin-web-app') {
        exclude group: 'com.github.pazone', module: 'ashot'
    }

    implementation 'org.vividus:vividus-plugin-rest-api'
    implementation 'org.vividus:vividus-plugin-json'

    implementation 'ru.yandex.qatools.ashot:ashot:1.5.4'
}

tasks.named('checkDependenciesConsistency') {
    enabled = false
}
tasks.named('spotlessCheck') {
    enabled = false
}
tasks.named('spotlessMiscCheck') {
    enabled = false
}
tasks.named('spotlessVividusCheck') {
    enabled = false
}
tasks.withType(Test) {
    systemProperty 'vividus.story.path', 'story'
}
